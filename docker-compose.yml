services:
  claude-code-dock:
    container_name: ${CONTAINER_NAME:-claude-code-dock}
    # `image:` lets `docker compose pull` fetch the prebuilt, CI-published image
    # (fast — no local apt-get/npm install). `build:` stays as the fallback path
    # for CLAUDE_SOURCE_PATH (local dev/testing of claude-code-dock itself) or
    # `docker compose build` when a prebuilt image isn't available/desired.
    #
    # IMPORTANT: because both keys are set, a bare `docker compose up -d` will
    # NOT rebuild if an image already exists locally under this tag (e.g. from
    # a prior `docker compose pull`) — Compose only builds when the tag is
    # missing or a build is explicitly requested. So CLAUDE_SOURCE_PATH only
    # takes priority if you force the build yourself:
    #   docker compose build --no-cache && docker compose up -d
    #   (or the one-liner: docker compose up -d --build)
    # scripts/install.sh and scripts/update.sh already do this automatically
    # whenever CLAUDE_SOURCE_PATH is set. See docs/docker.md#local-development.
    image: ${CLAUDE_DOCK_IMAGE:-ghcr.io/leonardomacedocano/claude-code-dock:latest}
    build:
      context: ${CLAUDE_SOURCE_PATH:-https://github.com/LeonardoMacedoCano/claude-code-dock.git#${CLAUDE_DOCK_VERSION:-main}}
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        CLAUDE_DOCK_SOURCE_PATH: ${CLAUDE_SOURCE_PATH:-}
        CLAUDE_DOCK_VERSION: ${CLAUDE_DOCK_VERSION:-main}
    environment:
      - AUTO_START_MODE=${AUTO_START_MODE:-interactive}
      - CLAUDE_AUTO_APPROVE=${CLAUDE_AUTO_APPROVE:-false}
      - CLAUDE_EXTRA_ARGS=${CLAUDE_EXTRA_ARGS:-}
      - REMOTE_SESSION_NAME=${REMOTE_SESSION_NAME:-}
      # Host-side paths, passed through so a startup permission failure can
      # print the exact host command to fix it instead of a generic placeholder.
      - CONFIG_BASE_PATH=${CONFIG_BASE_PATH:-}
      - WORKSPACE_PATH=${WORKSPACE_PATH:-}
      - TZ=${TZ:-UTC}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      # Fixed in-container convention path, not the host path from .env's
      # GITHUB_TOKEN_FILE below -- entrypoint.sh always reads the token from
      # here. Compose mounts the real file (or /dev/null when unset) to this
      # exact path in the `volumes:` block, so this line should not change.
      - GITHUB_TOKEN_FILE=/run/secrets/github_token
      - GIT_REPO_URL=${GIT_REPO_URL:-}
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ${WORKSPACE_PATH:-./workspaces}:/workspace
      - ${CONFIG_BASE_PATH:-./configs}/${REMOTE_SESSION_NAME:-default}:/home/node/.claude
      - ${SHARED_CONFIG_PATH:-./shared-config}:/home/node/.claude-shared:ro
      # Optional-file-mount idiom: mounts the real token file at the HOST path
      # from .env's GITHUB_TOKEN_FILE, or /dev/null (harmless, reads as empty)
      # when that's unset -- so this line is always safe to leave in place,
      # token configured or not. Set GITHUB_TOKEN_FILE=/path/on/host/to/token
      # in .env to enable; leave empty to skip GitHub authentication entirely.
      - ${GITHUB_TOKEN_FILE:-/dev/null}:/run/secrets/github_token:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Resource limits — uncomment and adjust for your server (recommended for shared homelabs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2g
    #     reservations:
    #       memory: 512m

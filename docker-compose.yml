services:
  claude-code-dock:
    container_name: ${CONTAINER_NAME:-claude-code-dock}
    image: ghcr.io/leonardomacedocano/claude-code-dock:${CLAUDE_DOCK_TAG:-latest}
    build:
      context: ${CLAUDE_SOURCE_PATH:-https://github.com/LeonardoMacedoCano/claude-code-dock.git#${CLAUDE_DOCK_VERSION:-main}}
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        CLAUDE_DOCK_SOURCE_PATH: ${CLAUDE_SOURCE_PATH:-}
        CLAUDE_DOCK_VERSION: ${CLAUDE_DOCK_VERSION:-main}
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - CONTAINER_NAME=${CONTAINER_NAME:-claude-code-dock}
      - AUTO_START_MODE=${AUTO_START_MODE:-interactive}
      - CLAUDE_AUTO_APPROVE=${CLAUDE_AUTO_APPROVE:-false}
      - CLAUDE_EXTRA_ARGS=${CLAUDE_EXTRA_ARGS:-}
      - REMOTE_SESSION_NAME=${REMOTE_SESSION_NAME:-}
      - CONFIG_BASE_PATH=${CONFIG_BASE_PATH:-}
      - WORKSPACE_PATH=${WORKSPACE_PATH:-}
      - TZ=${TZ:-UTC}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - GITHUB_TOKEN_FILE=/run/secrets/github_token
      - GIT_REPO_URL=${GIT_REPO_URL:-}
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ${WORKSPACE_PATH:-./workspaces}:/workspace
      - ${CONFIG_BASE_PATH:-./configs}/${REMOTE_SESSION_NAME:-default}:/home/node/.claude
      - ${GLOBAL_CONFIG_PATH:-/dev/null}:/home/node/.claude-global:ro
      - ${GITHUB_TOKEN_FILE:-/dev/null}:/run/secrets/github_token:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

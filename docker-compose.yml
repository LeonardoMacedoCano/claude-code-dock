services:
  claude-code-dock:
    container_name: ${CONTAINER_NAME:-claude-code-dock}
    build:
      context: ${CLAUDE_SOURCE_PATH:-.}
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    environment:
      - AUTO_START_MODE=${AUTO_START_MODE:-interactive}
      - CLAUDE_AUTO_APPROVE=${CLAUDE_AUTO_APPROVE:-true}
      - CLAUDE_EXTRA_ARGS=${CLAUDE_EXTRA_ARGS:-}
      - REMOTE_SESSION_NAME=${REMOTE_SESSION_NAME:-}
      - TZ=${TZ:-UTC}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_REPO_URL=${GIT_REPO_URL:-}
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ${WORKSPACE_PATH:-./workspaces}:/workspace
      - ${CONFIG_PATH:-./config}:/home/node/.claude
    stdin_open: true
    tty: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

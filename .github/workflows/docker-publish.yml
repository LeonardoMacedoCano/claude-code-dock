name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    # Rebuilds `latest` weekly even with no repo changes, so the published
    # image picks up new @anthropic-ai/claude-code releases (CACHEBUST below
    # forces a fresh npm install rather than reusing the GHA layer cache).
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      promote_stable:
        description: >-
          Also tag+push this build as 'stable'. 'latest' keeps moving on every
          push and on the weekly rebuild regardless of this input -- 'stable'
          only ever moves when a human runs this manually with this checked,
          so anyone can pin CLAUDE_DOCK_TAG=stable to avoid riding an
          untested weekly @anthropic-ai/claude-code bump.
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Nothing else in this suite ever parses docker-compose.yml itself --
      # tests/*.bats mocks entrypoint.sh's shell logic directly, and
      # tests/smoke.sh (below) boots the image via a raw `docker run`, not
      # `docker compose`. This is the only check that would catch a broken
      # interpolation or a YAML typo before it reaches an operator's
      # `docker compose up`. Runs with zero .env present on purpose -- every variable in these files already has
      # a `${VAR:-default}` fallback, so this is exactly what a fresh clone
      # sees before anyone has configured anything.
      - name: Validate docker-compose.yml (and the opt-in overlays) parse and resolve
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.yml -f docker-compose.resources.yml config
          docker compose -f docker-compose.yml -f docker-compose.watchdog.yml config

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          sudo npm install -g bats

      - name: Run test suite
        run: bash tests/run.sh

  smoke-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # tests/run.sh above only exercises entrypoint.sh's logic against a
      # mocked `docker` (bats). Nothing in that job ever actually builds the
      # image and boots a real container, so a regression that only manifests
      # at real-container runtime (setpriv/tmux interaction, a HEALTHCHECK CMD
      # that doesn't parse, a `set -e` trap on a real failing command) could
      # pass every bats test and still reach GHCR. This builds the image once
      # (single platform, amd64 -- the multi-arch build below is unaffected)
      # and boots a real container per AUTO_START_MODE, gating the publish
      # job on Docker's own HEALTHCHECK actually going "healthy".
      - name: Build image and boot real containers (all AUTO_START_MODE values)
        run: bash tests/smoke.sh

  build-and-push:
    needs: [test, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # github.repository preserves the account's original case
      # (LeonardoMacedoCano/...), but OCI image references must be all
      # lowercase. docker/metadata-action lowercases internally when building
      # tags, so the actual push always succeeds -- but the Trivy step below
      # reconstructs the ref by hand from env.IMAGE_NAME, so without this it
      # builds an invalid mixed-case reference and Trivy fails to parse it.
      - name: Lowercase image name for OCI compliance
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=stable,enable=${{ github.event_name == 'workflow_dispatch' && inputs.promote_stable == true }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            CACHEBUST=${{ github.run_id }}
            CLAUDE_DOCK_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed image for vulnerabilities
        # Pinned to a release that pins its own aquasecurity/setup-trivy
        # dependency by commit SHA rather than by tag -- v0.28.0 pinned
        # setup-trivy@v0.2.1, which aquasecurity later deleted upstream,
        # breaking this job with an unrelated "unable to find version" error.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

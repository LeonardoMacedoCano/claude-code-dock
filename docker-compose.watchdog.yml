# Optional companion service: runs scripts/watchdog.sh in a loop instead of a
# host crontab entry. NOT included by default and NOT auto-loaded by Compose
# (unlike docker-compose.override.yml) -- opt in explicitly:
#
#   docker compose -f docker-compose.yml -f docker-compose.watchdog.yml up -d
#
# Prefer `./scripts/install.sh --with-watchdog` (a plain host crontab entry)
# over this file unless you specifically can't run cron on this host (e.g. a
# minimal NAS OS with no user crontab available over SSH). That preference is
# deliberate, not a style choice:
#
# SECURITY TRADE-OFF -- read before enabling: this mounts the host's Docker
# socket (/var/run/docker.sock) read-write into the watchdog container so it
# can run `docker inspect`/`docker restart` against the main claude-code-dock
# container. Access to that socket is root-equivalent on the host -- anything
# with write access to it can inspect, control, or escape into ANY container
# on this host, not just this one (see https://docs.docker.com/engine/security/#docker-daemon-attack-surface).
# This is a materially different security posture than the rest of
# claude-code-dock, which deliberately exposes no ports and needs no
# host-level privilege at all (see docs/security.md). A host crontab entry
# calling scripts/watchdog.sh achieves the exact same restart behavior with
# no socket exposure, because it runs directly on the host instead of from
# inside a container -- that's why it's the default path install.sh offers.
services:
  watchdog:
    build:
      context: .
      dockerfile: docker/Dockerfile.watchdog
    container_name: ${CONTAINER_NAME:-claude-code-dock}-watchdog
    restart: unless-stopped
    environment:
      - CONTAINER_NAME=${CONTAINER_NAME:-claude-code-dock}
      - WATCHDOG_NTFY_URL=${WATCHDOG_NTFY_URL:-}
      # Seconds between checks -- kept independent of the main service's
      # HEALTHCHECK interval (30s) since restarting is a much heavier action
      # than probing; 5 minutes matches the crontab example in watchdog.sh.
      - WATCHDOG_INTERVAL=${WATCHDOG_INTERVAL:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
